name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, prod-live]

jobs:
  guard-no-prod-live-into-main:
    runs-on: ubuntu-latest
    steps:
      - name: Block prod-live as PR source into main
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Not a pull_request event."
            exit 0
          fi
          echo "base=${{ github.base_ref }} head=${{ github.head_ref }}"
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" = "prod-live" ]; then
            echo "::error::PRs from prod-live into main are blocked. Merge main into prod-live only."
            exit 1
          fi

  guard-prod-live-no-dev-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block protected dev paths in prod-live PRs
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.base_ref }}" != "prod-live" ]; then
            echo "Not a PR targeting prod-live."
            exit 0
          fi

          PRESENT="$(git ls-tree -r --name-only "$HEAD_SHA" | grep -E '^(data/|docs/|Prototype/|postman/|CLOUD_README\.md$|README\.md$|deslop\.pdf$|test\.csv$)' || true)"
          if [ -n "$PRESENT" ]; then
            echo "::error::prod-live must not contain protected dev paths."
            echo "$PRESENT"
            exit 1
          fi

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt pytest
      - run: pytest tests/ --tb=short
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t innovacx-backend ./backend
      - run: docker build -t innovacx-whisper ./backend/services/transcriber
      - run: docker build -t innovacx-chatbot ./backend/services/chatbot
