  <!-- Apply stored theme BEFORE React renders to prevent flash on toggle -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('cl_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
