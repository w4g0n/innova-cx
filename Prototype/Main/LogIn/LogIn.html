<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>InnovaCX Login</title>
</head>
<body>

<div class="wrapper">

    <!-- LEFT PURPLE PANEL -->
    <div class="left-panel">
        <div class="overlay"></div>

        <div class="left-content">
            <h1 class="welcome-title">Welcome back!</h1>

            <p class="welcome-sub">
                Sign-In using your given credentials.
            </p>

            <!-- LOGO MOVED DOWN HERE -->
            <img src="nova-logo.png" alt="Nova logo" class="logo-img">
        </div>
    </div>

    <!-- RIGHT LOGIN CARD -->
    <div class="login-card">
        <div class="login-header">
            <h2 class="login-title">Log In To InnovaCX</h2>
        </div>

        <div class="form-group">
            <label class="label" for="username">Email</label>
            <input type="text" id="username" class="input" placeholder="Enter your Email here">
        </div>

        <div class="form-group">
            <label class="label" for="password">Password</label>
            <input type="password" id="password" class="input" placeholder="Enter your Password here">
        </div>

        <a href="#" class="forgot-link">Forgot password?</a>

        <button class="login-btn">Log In</button>
    </div>

</div>

</body>
</html>
