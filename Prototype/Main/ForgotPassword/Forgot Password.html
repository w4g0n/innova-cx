<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset.css">
</head>
<body>

<div class="container">

    <div class="card">

        <!-- Back button = ONLY the image now -->
        <a href="login.html" class="back" aria-label="Back to login">
            <img src="arrow.png" alt="Back" class="back-img">
        </a>

        <h1 class="title">Reset Password</h1>
        <p class="subtitle">Enter your email to receive reset instructions.</p>

        <div class="form-group">
            <label for="username">Email</label>
            <input id="username" type="text" class="input" placeholder="Enter your Email here">
        </div>

        <button class="btn">Send</button>

        <p class="resend">
            Didn’t receive an email?
            <a href="#">Click here to resend</a>
        </p>

    </div>

</div>

</body>
</html>
