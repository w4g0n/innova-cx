<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nova – Raise Complaint (Text)</title>
  <link rel="stylesheet" href="raise.css">
</head>
<body>
<div class="layout">

  <!-- SIDEBAR (same style as Chatbot / Track) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="nova-logo.png" alt="Nova logo" class="logo-img">
      <span class="logo-text">InnovaCX</span>
    </div>

    <nav class="sidebar-links">
      <a href="#" class="sidebar-link">Notifications</a>
      <a href="#" class="sidebar-link">Dashboard</a>
      <a href="chatbot.html" class="sidebar-link">Chatbot</a>
      <a href="track.html" class="sidebar-link">Track My Complaint</a>
      <a href="raise-text.html" class="sidebar-link active">Raise a Complaint</a>
    </nav>

    <!-- SETTINGS (right above Logout) -->
    <button class="settings-btn">
      <span class="settings-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 14.86 2h-3.72a.5.5 0 0 0-.49.41l-.36 2.54c-.6.23-1.14.54-1.63.94l-2.39-.96a.5.5 0 0 0-.61.22L3.84 8.47a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.49.4 1.03.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.41h3.72a.5.5 0 0 0 .49-.41l.36-2.54c.6-.23 1.14-.54 1.63-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"
                fill="#ffffff"/>
        </svg>
      </span>
      <span>Settings</span>
    </button>

    <button class="logout-btn">
      <span class="logout-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 5v2h6.59L13 10.59 14.41 12 20 6.41 14.41 1 13 2.41 16.59 6H10z"
                fill="#ffffff"/>
          <path d="M4 3h6v2H6v14h4v2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"
                fill="#ffffff"/>
        </svg>
      </span>
      <span>Logout</span>
    </button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main raise-main">
    <h1 class="page-title">Raise A Text Complaint</h1>

    <!-- TOGGLE TABS -->
    <div class="complaint-tabs">
      <!-- Text on the LEFT and active (dark) -->
      <button class="tab-btn active-tab">Text Complaint</button>
      <!-- Audio on the RIGHT and light -->
      <button class="tab-btn">Audio Complaint</button>
    </div>

    <!-- FORM CARD -->
    <section class="form-card">
      <form class="complaint-form">

        <!-- Full Name -->
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" class="input-field">
        </div>

        <!-- Phone Number (country prefix + number) -->
<div class="form-row">

  <!-- PREFIX (styled pill but same height as input) -->
  <div class="form-group phone-prefix">
    <label for="phoneNumberInput">Phone Number</label>
    <div class="phone-prefix-pill">
      <span class="phone-code">+971</span>
    </div>
  </div>

  <!-- MAIN NUMBER INPUT -->
  <div class="form-group phone-main">
    <label class="invisible-label" for="phoneNumberInput">Phone Number</label>
    <input type="text" id="phoneNumberInput" class="input-field">
  </div>

</div>


        <!-- Company -->
        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" class="input-field">
        </div>

        <!-- Subject -->
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" class="input-field">
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" class="textarea-field" rows="5"></textarea>
        </div>

          <!-- Submit button -->
<div class="submit-row">
  <button type="button" class="submit-btn" onclick="openPopup()">
    Submit Complaint
  </button>
</div>


      </form>
      <div class="modal-overlay" id="popup">
  <div class="modal-box">
    <button class="modal-close" onclick="closePopup()">×</button>

<div class="modal-icon">✔</div>

    <h2 class="modal-title">Complaint Submitted</h2>
    <p class="modal-ticket">Ticket # CX-1122</p>

    <button class="modal-btn" onclick="closePopup()">
      Submit Another Complaint
    </button>

    <p class="modal-note">
      We'll notify you of updates via email and SMS.
    </p>
  </div>
</div>

    </section>
  </main>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
