# CI override — applied on top of docker-compose.yml in CI runs only.
# Adds -ci- prefix to all container names and removes host port mappings so
# CI containers never conflict with the live production stack on the same VM.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml ...
#
# ports: !reset [] uses the Compose v2 YAML merge reset tag to fully clear
# the base list rather than appending to it (plain ports: [] just appends nothing).
services:
  postgres:
    container_name: innovacx-ci-db
    ports: !reset []
  backend:
    container_name: innovacx-ci-backend
    ports: !reset []
  chatbot:
    container_name: innovacx-ci-chatbot
    ports: !reset []
  transcriber:
    container_name: innovacx-ci-transcriber
    ports: !reset []
  orchestrator:
    container_name: innovacx-ci-orchestrator
    ports: !reset []
  frontend:
    container_name: innovacx-ci-frontend
    ports: !reset []
  backup:
    container_name: innovacx-ci-backup
