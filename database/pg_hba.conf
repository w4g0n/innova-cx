# =============================================================================
# InnovaCX - PostgreSQL Host-Based Authentication
# File: database/pg_hba.conf
#
# PURPOSE:
#   Controls which roles can connect, from where, and how they authenticate.
#
# RULE EVALUATION:
#   PostgreSQL reads rules top-to-bottom and uses the FIRST match.
#   More specific rules must come before more general ones.
#
# ROLES:
#   innovacx_admin    - superuser/owner; migrations, backup restore only
#   innovacx_app      - runtime application (backend, chatbot, orchestrator)
#   innovacx_readonly - read-only reporting; future use
#   innovacx_test     - test environment only; never in production runtime
#
# CONNECTION TYPES:
#   local  - Unix socket (docker-entrypoint-initdb.d init scripts)
#   host   - TCP/IP (app services, backup container, external tools)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Unix socket connections (local - inside the container only)
#    Required for:
#      - docker-entrypoint-initdb.d init scripts (run as postgres/innovacx_admin)
#      - pg_isready healthcheck
#      - Manual psql sessions inside the container
# -----------------------------------------------------------------------------
local   all             all                                     trust

# -----------------------------------------------------------------------------
# 2. Loopback TCP connections (127.0.0.1 - inside the container only)
#    Required for pg_isready healthcheck which uses -h localhost.
# -----------------------------------------------------------------------------
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# -----------------------------------------------------------------------------
# 3. Remote TCP connections - BLOCK superuser accounts from external IPs.
#    innovacx_admin and postgres must never be reachable over the public network.
#    These rules match before the general allow-all rule below.
#
#    EXCEPTION: The backup container connects as innovacx_admin over the
#    internal Docker network (172.16.0.0/12 covers all default Docker bridge
#    subnets) to run pg_restore and CREATE/DROP the restore-test database.
#    This uses md5 (password required) - not trust. The password is the same
#    POSTGRES_PASSWORD set in .env and never exposed externally because port
#    5432 is expose-only (not mapped to the host) in docker-compose.yml.
# -----------------------------------------------------------------------------
host    all             innovacx_admin  172.16.0.0/12           md5
host    all             innovacx_admin  0.0.0.0/0               reject
host    all             innovacx_admin  ::/0                    reject
host    all             postgres        0.0.0.0/0               reject
host    all             postgres        ::/0                    reject

# -----------------------------------------------------------------------------
# 4. innovacx_test - explicit entry before the catch-all.
#    Listed here to make intent visible and allow future tightening
#    (e.g. restricting to loopback/specific subnet) without a structural
#    rewrite. Uses md5 - password always required.
#    NOTE: innovacx_test should NEVER be used by any production service.
# -----------------------------------------------------------------------------
host    all             innovacx_test   0.0.0.0/0               md5
host    all             innovacx_test   ::/0                    md5

# -----------------------------------------------------------------------------
# 5. Remote TCP connections - ALLOW innovacx_app, innovacx_readonly,
#    and all other non-superuser roles.
#    App services (backend, orchestrator, chatbot) connect via Docker network.
#    md5 requires a password - no passwordless remote access.
# -----------------------------------------------------------------------------
host    all             all             0.0.0.0/0               md5
host    all             all             ::/0                    md5