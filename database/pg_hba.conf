# =============================================================================
# InnovaCX — PostgreSQL Host-Based Authentication
# File: database/pg_hba.conf
#
# PURPOSE:
#   Block remote login for the superuser (innovacx_admin) while allowing
#   the runtime application role (innovacx_app) to connect normally.
#
# RULE EVALUATION:
#   PostgreSQL reads rules top-to-bottom and uses the FIRST match.
#   More specific rules must come before more general ones.
#
# CONNECTION TYPES:
#   local  — Unix socket (used by docker-entrypoint-initdb.d init scripts)
#   host   — TCP/IP (used by app services and any external connection)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Unix socket connections (local — inside the container only)
#    Required for:
#      - docker-entrypoint-initdb.d init scripts (run as postgres/innovacx_admin)
#      - pg_isready healthcheck
#      - Manual psql sessions inside the container
# -----------------------------------------------------------------------------
local   all             all                                     trust

# -----------------------------------------------------------------------------
# 2. Loopback TCP connections (127.0.0.1 — inside the container only)
#    Required for pg_isready healthcheck which uses -h localhost.
# -----------------------------------------------------------------------------
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# -----------------------------------------------------------------------------
# 3. Remote TCP connections — BLOCK superuser accounts
#    innovacx_admin and postgres must never be reachable over the network.
#    These rules match before the general allow-all rule below.
# -----------------------------------------------------------------------------
host    all             innovacx_admin  0.0.0.0/0               reject
host    all             innovacx_admin  ::/0                    reject
host    all             postgres        0.0.0.0/0               reject
host    all             postgres        ::/0                    reject

# -----------------------------------------------------------------------------
# 4. Remote TCP connections — ALLOW innovacx_app and all other non-superuser roles
#    App services (backend, orchestrator, chatbot) connect via Docker network.
#    md5 requires a password — no passwordless remote access.
# -----------------------------------------------------------------------------
host    all             all             0.0.0.0/0               md5
host    all             all             ::/0                    md5
