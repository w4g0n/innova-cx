services:
  postgres:
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: innovacx_admin
      POSTGRES_PASSWORD: changeme123
      POSTGRES_DB: complaints_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovacx_admin -d complaints_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://innovacx_admin:changeme123@postgres:5432/complaints_db
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - innovacx-network
    command: >
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  whisper:
    profiles:
      - audio
    build: ./backend/audio-transcriber/whisper
    container_name: innovacx-whisper
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

volumes:
  postgres_data:

networks:
  innovacx-network: