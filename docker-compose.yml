services:
  postgres:
    profiles: ["frontend", "pipeline", "dev"]
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["frontend", "pipeline", "dev"]
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SYSTEM_USER_EMAIL: "${SYSTEM_USER_EMAIL:-customer1@innova.cx}"
      DISABLE_MFA: "${DISABLE_MFA:-false}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      CHATBOT_PROXY_TIMEOUT_SECONDS: "${CHATBOT_PROXY_TIMEOUT_SECONDS:-120}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - innovacx-network

  chatbot:
    profiles: ["dev"]
    build: ./backend/services/chatbot
    container_name: innovacx-chatbot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /app/hf_cache
      CHATBOT_MODEL_SOURCE: ${CHATBOT_MODEL_SOURCE:-tiiuae/Falcon3-1B-Instruct}
      CHATBOT_MODEL_LOCAL_DIR: /app/models/falcon3-1b-instruct
      CHATBOT_MAX_NEW_TOKENS: "${CHATBOT_MAX_NEW_TOKENS:-96}"
      CHATBOT_DO_SAMPLE: "${CHATBOT_DO_SAMPLE:-true}"
      CHATBOT_TEMPERATURE: "${CHATBOT_TEMPERATURE:-0.7}"
      CHATBOT_TOP_P: "${CHATBOT_TOP_P:-0.9}"
    volumes:
      - hf_cache:/app/hf_cache
      - chatbot_models:/app/models
    ports:
      - "8001:8000"
    networks:
      - innovacx-network

  transcriber:
    profiles: ["dev"]
    build: ./backend/services/transcriber
    container_name: innovacx-transcriber
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

  orchestrator:
    profiles: ["pipeline", "dev"]
    build:
      context: .
      dockerfile: ai-models/MultiAgentPipeline/Orchestrator/Dockerfile
    container_name: innovacx-orchestrator
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      SYSTEM_USER_EMAIL: "${SYSTEM_USER_EMAIL:-customer1@innova.cx}"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8004:8004"
    networks:
      - innovacx-network

  frontend:
    profiles: ["frontend", "pipeline", "dev"]
    build: ./frontend
    container_name: innovacx-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_ORCHESTRATOR_URL: ${VITE_ORCHESTRATOR_URL:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - innovacx-network

volumes:
  postgres_data:
  hf_cache:
  chatbot_models:

networks:
  innovacx-network:
