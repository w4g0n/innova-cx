services:
  postgres:
    profiles: ["frontend", "backend", "dev"]
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["frontend", "backend", "dev"]
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - innovacx-network

  chatbot:
    profiles: ["chatbot", "dev"]
    build: ./backend/ChatbotAgent
    container_name: innovacx-chatbot
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /app/hf_cache
      CHATBOT_MODEL: ${CHATBOT_MODEL:-tiiuae/Falcon3-1B-Instruct}
    volumes:
      - hf_cache:/app/hf_cache
    ports:
      - "8001:8000"
    networks:
      - innovacx-network

  whisper:
    profiles: ["audio", "backend", "dev"]
    build: ./ai-models/MultiAgentPipeline/AudioAnalysisAndTranscriberAgent/whisper
    container_name: innovacx-whisper
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

  sentiment:
    profiles: ["backend", "dev"]
    build: ./backend/sentiment-service
    container_name: innovacx-sentiment
    restart: unless-stopped
    environment:
      USE_MOCK_MODEL: "${USE_MOCK_MODEL:-true}"
      MODEL_PATH: /app/models
    volumes:
      - ${SENTIMENT_MODEL_PATH:-./backend/sentiment-service/models}:/app/models
    ports:
      - "8002:8002"
    networks:
      - innovacx-network

  classifier:
    profiles: ["backend", "dev"]
    build: ./ai-models/MultiAgentPipeline/ClassificationAgent
    container_name: innovacx-classifier
    restart: unless-stopped
    environment:
      USE_MOCK_CLASSIFIER: "${USE_MOCK_CLASSIFIER:-true}"
    ports:
      - "8003:8003"
    networks:
      - innovacx-network

  orchestrator:
    profiles: ["backend", "dev"]
    build:
      context: .
      dockerfile: backend/orchestrator/Dockerfile
    container_name: innovacx-orchestrator
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
    depends_on:
      - backend
      - classifier
    ports:
      - "8004:8004"
    networks:
      - innovacx-network

  feature-engineering:
    profiles: ["feature-engineering"]
    build:
      context: ./ai-models/MultiAgentPipeline/FeatureEngineeringAgent
    container_name: innovacx-feature-engineering
    volumes:
      - ./ai-models/MultiAgentPipeline/FeatureEngineeringAgent/app:/app/app
      - ./ai-models/MultiAgentPipeline/FeatureEngineeringAgent/data:/app/data
      - ./ai-models/MultiAgentPipeline/FeatureEngineeringAgent/models:/app/models
    networks:
      - innovacx-network
    restart: unless-stopped


  frontend:
    profiles: ["frontend", "backend", "dev"]
    build: ./frontend
    container_name: innovacx-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_CHATBOT_BASE_URL: http://localhost:8001
      VITE_WHISPER_BASE_URL: http://localhost:3001
      VITE_SENTIMENT_URL: http://localhost:8002
      VITE_ORCHESTRATOR_URL: http://localhost:8004
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - innovacx-network

volumes:
  postgres_data:
  hf_cache:

networks:
  innovacx-network:
