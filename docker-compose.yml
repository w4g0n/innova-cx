services:
  postgres:
    profiles: ["backend"]
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["backend"]
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - innovacx-network

  chatbot:
    profiles: ["frontend"]
    build: ./backend/chatbot
    container_name: innovacx-chatbot
    restart: unless-stopped
    ports:
      - "8001:8000"
    networks:
      - innovacx-network

  whisper:
    profiles: ["frontend"]
    build: ./backend/audio-transcriber/whisper
    container_name: innovacx-whisper
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

  sentiment:
    profiles: ["frontend"]
    build: ./backend/sentiment-service
    container_name: innovacx-sentiment
    restart: unless-stopped
    environment:
      USE_MOCK_MODEL: "false"
      MODEL_PATH: /app/models
    volumes:
      - C:/Users/ali/Desktop/Model:/app/models
    ports:
      - "8002:8002"
    networks:
      - innovacx-network

  frontend:
    profiles: ["frontend"]
    build: ./frontend
    container_name: innovacx-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - chatbot
      - whisper
    networks:
      - innovacx-network

volumes:
  postgres_data:

networks:
  innovacx-network: