services:
  postgres:
    profiles: ["frontend", "pipeline", "dev"]
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["frontend", "pipeline", "dev"]
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SYSTEM_USER_EMAIL: "${SYSTEM_USER_EMAIL:-customer1@innova.cx}"
      DISABLE_MFA: "${DISABLE_MFA:-false}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - innovacx-network

  chatbot:
    profiles: ["dev"]
    build: ./backend/services/chatbot
    container_name: innovacx-chatbot
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /app/hf_cache
      CHATBOT_MODEL: ${CHATBOT_MODEL:-tiiuae/Falcon3-1B-Instruct}
    volumes:
      - hf_cache:/app/hf_cache
    ports:
      - "8001:8000"
    networks:
      - innovacx-network

  transcriber:
    profiles: ["dev"]
    build: ./backend/services/transcriber
    container_name: innovacx-transcriber
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

  classifier:
    profiles: ["pipeline", "dev"]
    build: ./ai-models/legacy/MultiAgentPipeline/ClassificationAgent
    container_name: innovacx-classifier
    restart: unless-stopped
    environment:
      USE_MOCK_CLASSIFIER: "${USE_MOCK_CLASSIFIER:-true}"
    ports:
      - "8003:8003"
    networks:
      - innovacx-network

  orchestrator:
    profiles: ["pipeline", "dev"]
    build:
      context: .
      dockerfile: ai-models/MultiAgentPipeline/Orchestrator/Dockerfile
    container_name: innovacx-orchestrator
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      SYSTEM_USER_EMAIL: "${SYSTEM_USER_EMAIL:-customer1@innova.cx}"
    depends_on:
      backend:
        condition: service_started
      classifier:
        condition: service_started
    ports:
      - "8004:8004"
    networks:
      - innovacx-network

  feature-engineering:
    profiles: ["feature-engineering"]
    build:
      context: ./ai-models/legacy/MultiAgentPipeline/FeatureEngineeringAgent_runtime
    container_name: innovacx-feature-engineering
    volumes:
      - ./ai-models/legacy/MultiAgentPipeline/FeatureEngineeringAgent_runtime/app:/app/app
      - ./ai-models/legacy/MultiAgentPipeline/FeatureEngineeringAgent_runtime/data:/app/data
      - ./ai-models/legacy/MultiAgentPipeline/FeatureEngineeringAgent_runtime/models:/app/models
    networks:
      - innovacx-network
    restart: unless-stopped


  frontend:
    profiles: ["frontend", "pipeline", "dev"]
    build: ./frontend
    container_name: innovacx-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ORCHESTRATOR_URL: http://localhost:8004
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - innovacx-network

volumes:
  postgres_data:
  hf_cache:

networks:
  innovacx-network:
