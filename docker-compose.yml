services:
  postgres:
    profiles: ["backend"]
    image: postgres:14-alpine
    container_name: innovacx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - innovacx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["backend"]
    build: ./backend
    container_name: innovacx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - innovacx-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  whisper:
    profiles: ["audio"]
    build: ./backend/audio-transcriber/whisper
    container_name: innovacx-whisper
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - innovacx-network

  chatbot:
    profiles: ["chatbot"]
    build: ./chatbot
    container_name: innovacx-chatbot
    stdin_open: true
    tty: true
    volumes:
      - ./chatbot/data:/app/data
    networks:
      - innovacx-network

  frontend:
    profiles: ["frontend"]
    build: ./frontend
    container_name: innovacx-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - innovacx-network

volumes:
  postgres_data:

networks:
  innovacx-network: